kind = "web"
previewPath = "/"
title = "ImpactOS"
version = "1.0.0"
id = "artifacts/impact-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22257

[services.development]
run = "pnpm --filter @workspace/impact-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/impact-os", "run", "build" ]
publicDir = "artifacts/impact-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22257"
BASE_PATH = "/"
