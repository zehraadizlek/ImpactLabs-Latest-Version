openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ImpactOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI-powered impact analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/generate-theory:
    post:
      operationId: generateTheoryOfChange
      tags: [ai]
      summary: Generate Theory of Change
      description: >
        Uses AI to generate Outcomes and Impact statements given the
        organization's SDG focus, primary beneficiary, activities, and outputs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TheoryInput"
      responses:
        "200":
          description: Generated outcomes and impact statements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TheoryResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ai/suggest-kpis:
    post:
      operationId: suggestKpis
      tags: [ai]
      summary: Suggest KPIs
      description: >
        Suggests measurement indicators, baselines, targets, and frequency for
        each provided output and outcome.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiInput"
      responses:
        "200":
          description: Suggested KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ai/generate-report:
    post:
      operationId: generateReport
      tags: [ai]
      summary: Generate the full impact report
      description: >
        Uses AI to generate every narrative section of a professional,
        investor-ready impact report from the organization's full profile and
        wizard inputs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "200":
          description: The generated report content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedReport"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TheoryInput:
      type: object
      required:
        - sdgs
        - beneficiary
        - activities
        - outputs
      properties:
        sdgs:
          type: array
          items:
            type: string
        beneficiary:
          type: string
        activities:
          type: array
          items:
            type: string
        outputs:
          type: array
          items:
            type: string
    TheoryResult:
      type: object
      required:
        - outcomes
        - impact
      properties:
        outcomes:
          type: array
          items:
            type: string
        impact:
          type: array
          items:
            type: string
    KpiInput:
      type: object
      required:
        - items
      properties:
        sector:
          type: string
        items:
          type: array
          items:
            type: string
          description: The outputs and outcomes to suggest KPIs for
    KpiSuggestion:
      type: object
      required:
        - item
        - indicator
        - baseline
        - target
        - frequency
      properties:
        item:
          type: string
        indicator:
          type: string
        baseline:
          type: string
        target:
          type: string
        frequency:
          type: string
    KpiResult:
      type: object
      required:
        - kpis
      properties:
        kpis:
          type: array
          items:
            $ref: "#/components/schemas/KpiSuggestion"
    ReportInput:
      type: object
      required:
        - orgName
      properties:
        orgName:
          type: string
        orgType:
          type: string
        industry:
          type: string
        mission:
          type: string
        country:
          type: string
        reportingPeriod:
          type: string
        sdgs:
          type: array
          items:
            type: string
        sdgChanges:
          type: array
          items:
            type: string
        primaryBeneficiary:
          type: string
        secondaryStakeholders:
          type: array
          items:
            type: string
        activities:
          type: array
          items:
            type: string
        outputs:
          type: array
          items:
            type: string
        outcomes:
          type: array
          items:
            type: string
        impact:
          type: array
          items:
            type: string
        website:
          type: string
        beneficiaryGroups:
          type: array
          items:
            type: string
        keyPrograms:
          type: array
          items:
            $ref: "#/components/schemas/ProgramInput"
        keyMetrics:
          type: array
          items:
            $ref: "#/components/schemas/MetricInput"
    ProgramInput:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
        description:
          type: string
    MetricInput:
      type: object
      required:
        - label
        - value
      properties:
        label:
          type: string
        value:
          type: string
    HeroMetric:
      type: object
      required:
        - value
        - label
        - context
      properties:
        value:
          type: string
        label:
          type: string
        context:
          type: string
    GlanceKpi:
      type: object
      required:
        - label
        - value
        - change
      properties:
        label:
          type: string
        value:
          type: string
        change:
          type: string
    TimelineItem:
      type: object
      required:
        - date
        - title
        - description
      properties:
        date:
          type: string
        title:
          type: string
        description:
          type: string
    OrgOverview:
      type: object
      required:
        - mission
        - vision
        - problem
        - targetBeneficiaries
      properties:
        mission:
          type: string
        vision:
          type: string
        problem:
          type: string
        targetBeneficiaries:
          type: string
    ProgramMetric:
      type: object
      required:
        - label
        - value
      properties:
        label:
          type: string
        value:
          type: string
    Program:
      type: object
      required:
        - name
        - objective
        - activities
        - outputs
        - outcomes
        - beneficiaries
        - metrics
      properties:
        name:
          type: string
        objective:
          type: string
        activities:
          type: array
          items:
            type: string
        outputs:
          type: array
          items:
            type: string
        outcomes:
          type: array
          items:
            type: string
        beneficiaries:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/ProgramMetric"
    BeneficiaryProfile:
      type: object
      required:
        - name
        - group
        - story
        - quote
        - before
        - after
      properties:
        name:
          type: string
        group:
          type: string
        story:
          type: string
        quote:
          type: string
        before:
          type: string
        after:
          type: string
    Testimonial:
      type: object
      required:
        - quote
        - author
        - role
      properties:
        quote:
          type: string
        author:
          type: string
        role:
          type: string
    BeneficiaryImpact:
      type: object
      required:
        - profiles
        - testimonials
      properties:
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/BeneficiaryProfile"
        testimonials:
          type: array
          items:
            $ref: "#/components/schemas/Testimonial"
    DashboardMetric:
      type: object
      required:
        - label
        - value
        - unit
        - change
      properties:
        label:
          type: string
        value:
          type: string
        unit:
          type: string
        change:
          type: string
    GrowthPoint:
      type: object
      required:
        - period
        - value
      properties:
        period:
          type: string
        value:
          type: number
    DistributionSlice:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
        value:
          type: number
    ProgressBar:
      type: object
      required:
        - label
        - current
        - target
        - unit
      properties:
        label:
          type: string
        current:
          type: number
        target:
          type: number
        unit:
          type: string
    GeoPoint:
      type: object
      required:
        - region
        - value
      properties:
        region:
          type: string
        value:
          type: number
    ImpactDashboard:
      type: object
      required:
        - metrics
        - growthSeries
        - distribution
        - progressBars
        - geographic
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/DashboardMetric"
        growthSeries:
          type: array
          items:
            $ref: "#/components/schemas/GrowthPoint"
        distribution:
          type: array
          items:
            $ref: "#/components/schemas/DistributionSlice"
        progressBars:
          type: array
          items:
            $ref: "#/components/schemas/ProgressBar"
        geographic:
          type: array
          items:
            $ref: "#/components/schemas/GeoPoint"
    TheoryOfChangeVisual:
      type: object
      required:
        - inputs
        - activities
        - outputs
        - outcomes
        - longTermImpact
      properties:
        inputs:
          type: array
          items:
            type: string
        activities:
          type: array
          items:
            type: string
        outputs:
          type: array
          items:
            type: string
        outcomes:
          type: array
          items:
            type: string
        longTermImpact:
          type: array
          items:
            type: string
    MeasurementRow:
      type: object
      required:
        - metric
        - baseline
        - target
        - current
        - dataSource
        - frequency
      properties:
        metric:
          type: string
        baseline:
          type: string
        target:
          type: string
        current:
          type: string
        dataSource:
          type: string
        frequency:
          type: string
    ChallengeItem:
      type: object
      required:
        - challenge
        - lesson
        - adaptation
      properties:
        challenge:
          type: string
        lesson:
          type: string
        adaptation:
          type: string
    ChallengesLearnings:
      type: object
      required:
        - challenges
        - risks
        - futureImprovements
      properties:
        challenges:
          type: array
          items:
            $ref: "#/components/schemas/ChallengeItem"
        risks:
          type: array
          items:
            type: string
        futureImprovements:
          type: array
          items:
            type: string
    Milestone:
      type: object
      required:
        - period
        - goal
      properties:
        period:
          type: string
        goal:
          type: string
    FutureCommitments:
      type: object
      required:
        - nextYearGoals
        - roadmap
        - expansionPlans
        - longTermVision
      properties:
        nextYearGoals:
          type: array
          items:
            type: string
        roadmap:
          type: array
          items:
            $ref: "#/components/schemas/Milestone"
        expansionPlans:
          type: array
          items:
            type: string
        longTermVision:
          type: string
    Appendix:
      type: object
      required:
        - methodology
        - dataSources
        - reportingNotes
      properties:
        methodology:
          type: string
        dataSources:
          type: array
          items:
            type: string
        reportingNotes:
          type: string
    GeneratedReport:
      type: object
      required:
        - heroMetric
        - glanceKpis
        - achievementsTimeline
        - overview
        - programs
        - beneficiaryImpact
        - dashboard
        - theoryOfChange
        - measurementFramework
        - challengesLearnings
        - futureCommitments
        - appendix
      properties:
        heroMetric:
          $ref: "#/components/schemas/HeroMetric"
        glanceKpis:
          type: array
          items:
            $ref: "#/components/schemas/GlanceKpi"
        achievementsTimeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineItem"
        overview:
          $ref: "#/components/schemas/OrgOverview"
        programs:
          type: array
          items:
            $ref: "#/components/schemas/Program"
        beneficiaryImpact:
          $ref: "#/components/schemas/BeneficiaryImpact"
        dashboard:
          $ref: "#/components/schemas/ImpactDashboard"
        theoryOfChange:
          $ref: "#/components/schemas/TheoryOfChangeVisual"
        measurementFramework:
          type: array
          items:
            $ref: "#/components/schemas/MeasurementRow"
        challengesLearnings:
          $ref: "#/components/schemas/ChallengesLearnings"
        futureCommitments:
          $ref: "#/components/schemas/FutureCommitments"
        appendix:
          $ref: "#/components/schemas/Appendix"
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
