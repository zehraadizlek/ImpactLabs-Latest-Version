openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ImpactOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI-powered impact analysis
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/generate-theory:
    post:
      operationId: generateTheoryOfChange
      tags: [ai]
      summary: Generate Theory of Change
      description: >
        Uses AI to generate Outcomes and Impact statements given the
        organization's SDG focus, primary beneficiary, activities, and outputs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TheoryInput"
      responses:
        "200":
          description: Generated outcomes and impact statements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TheoryResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ai/suggest-kpis:
    post:
      operationId: suggestKpis
      tags: [ai]
      summary: Suggest KPIs
      description: >
        Suggests measurement indicators, baselines, targets, and frequency for
        each provided output and outcome.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KpiInput"
      responses:
        "200":
          description: Suggested KPIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ai/generate-report:
    post:
      operationId: generateReport
      tags: [ai]
      summary: Generate the full impact report
      description: >
        Uses AI to generate every narrative section of a professional,
        investor-ready impact report from the organization's full profile and
        wizard inputs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "200":
          description: The generated report content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedReport"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TheoryInput:
      type: object
      required:
        - sdgs
        - beneficiary
        - activities
        - outputs
      properties:
        sdgs:
          type: array
          items:
            type: string
        beneficiary:
          type: string
        activities:
          type: array
          items:
            type: string
        outputs:
          type: array
          items:
            type: string
    TheoryResult:
      type: object
      required:
        - outcomes
        - impact
      properties:
        outcomes:
          type: array
          items:
            type: string
        impact:
          type: array
          items:
            type: string
    KpiInput:
      type: object
      required:
        - items
      properties:
        sector:
          type: string
        items:
          type: array
          items:
            type: string
          description: The outputs and outcomes to suggest KPIs for
    KpiSuggestion:
      type: object
      required:
        - item
        - indicator
        - baseline
        - target
        - frequency
      properties:
        item:
          type: string
        indicator:
          type: string
        baseline:
          type: string
        target:
          type: string
        frequency:
          type: string
    KpiResult:
      type: object
      required:
        - kpis
      properties:
        kpis:
          type: array
          items:
            $ref: "#/components/schemas/KpiSuggestion"
    ReportInput:
      type: object
      required:
        - orgName
      properties:
        orgName:
          type: string
        orgType:
          type: string
        industry:
          type: string
        mission:
          type: string
        country:
          type: string
        reportingPeriod:
          type: string
        sdgs:
          type: array
          items:
            type: string
        sdgChanges:
          type: array
          items:
            type: string
        primaryBeneficiary:
          type: string
        secondaryStakeholders:
          type: array
          items:
            type: string
        activities:
          type: array
          items:
            type: string
        outputs:
          type: array
          items:
            type: string
        outcomes:
          type: array
          items:
            type: string
        impact:
          type: array
          items:
            type: string
    SdgAlignment:
      type: object
      required:
        - sdg
        - whyItMatters
        - expectedContribution
      properties:
        sdg:
          type: integer
        whyItMatters:
          type: string
        expectedContribution:
          type: string
    ImpactStrategy:
      type: object
      required:
        - longTermVision
        - strategicObjectives
        - keyInitiatives
      properties:
        longTermVision:
          type: string
        strategicObjectives:
          type: array
          items:
            type: string
        keyInitiatives:
          type: array
          items:
            type: string
    RiskAnalysis:
      type: object
      required:
        - keyRisks
        - dependencies
        - mitigation
      properties:
        keyRisks:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string
        mitigation:
          type: array
          items:
            type: string
    FutureCommitments:
      type: object
      required:
        - nextYearGoals
        - expansionPlans
        - sdgRoadmap
      properties:
        nextYearGoals:
          type: array
          items:
            type: string
        expansionPlans:
          type: array
          items:
            type: string
        sdgRoadmap:
          type: array
          items:
            type: string
    ImpactGrowthPoint:
      type: object
      required:
        - period
        - value
      properties:
        period:
          type: string
        value:
          type: number
    ProgressMetrics:
      type: object
      required:
        - beneficiariesReached
        - partnershipsFormed
        - projectsLaunched
        - impactGrowth
      properties:
        beneficiariesReached:
          type: number
        partnershipsFormed:
          type: number
        projectsLaunched:
          type: number
        impactGrowth:
          type: array
          items:
            $ref: "#/components/schemas/ImpactGrowthPoint"
    GeneratedReport:
      type: object
      required:
        - executiveSummary
        - sdgAlignment
        - stakeholderAnalysis
        - theoryOfChangeNarrative
        - impactStrategy
        - measurementFramework
        - risks
        - futureCommitments
        - progressMetrics
      properties:
        executiveSummary:
          type: string
        sdgAlignment:
          type: array
          items:
            $ref: "#/components/schemas/SdgAlignment"
        stakeholderAnalysis:
          type: string
        theoryOfChangeNarrative:
          type: string
        impactStrategy:
          $ref: "#/components/schemas/ImpactStrategy"
        measurementFramework:
          type: string
        risks:
          $ref: "#/components/schemas/RiskAnalysis"
        futureCommitments:
          $ref: "#/components/schemas/FutureCommitments"
        progressMetrics:
          $ref: "#/components/schemas/ProgressMetrics"
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
